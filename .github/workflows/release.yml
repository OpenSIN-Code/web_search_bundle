name: Release

on:
  push:
    tags:
      - 'v*'
      - '!v*-ceo-audit-v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dist/sin-websearch-darwin-amd64 ./cmd/sin-websearch
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o dist/sin-websearch-darwin-arm64 ./cmd/sin-websearch
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/sin-websearch-linux-amd64 ./cmd/sin-websearch
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o dist/sin-websearch-linux-arm64 ./cmd/sin-websearch
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/sin-websearch-windows-amd64.exe ./cmd/sin-websearch

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
